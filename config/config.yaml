voice:
  stt_engine: faster-whisper
  whisper_model: base
  vad_enabled: true
  vad_threshold: 0.5
  language: en
  input_mode: text
chunking:
  strategy: paragraph
  chunk_size: 500
  chunk_overlap: 50
  chunk_unit: characters
  min_chunk_size: 30
  max_chunk_size: 2048
  respect_sentence_boundaries: true
  prepend_metadata: true
  heading_levels:
  - 1
  - 2
  - 3
  rows_per_chunk: 50
  include_headers: true
  include_notes: true
  target_tags: []
  semantic_similarity_threshold: 0.5
  per_format:
    txt:
      strategy: paragraph
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
    md:
      strategy: header_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      split_code_blocks: false
    docx:
      strategy: heading_hierarchy
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      include_tables: true
      heading_levels:
      - 1
      - 2
      - 3
    doc:
      strategy: heading_hierarchy
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      convert_first: true
    pdf:
      strategy: paragraph
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      extract_tables: true
      table_as_single_chunk: true
    xlsx:
      strategy: row_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      rows_per_chunk: 20
      include_headers: true
      sheets: all
    xls:
      strategy: row_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      convert_first: true
    csv:
      strategy: row_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      rows_per_chunk: 50
      delimiter: ','
    tsv:
      strategy: row_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      rows_per_chunk: 50
      delimiter: "\t"
    json:
      strategy: array_item
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      depth: 3
    jsonl:
      strategy: line_per_chunk
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
    xml:
      strategy: tag_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      target_tags:
      - record
      - item
      - entry
    html:
      strategy: main_content
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      extract_tables: true
    epub:
      strategy: chapter_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
    pptx:
      strategy: slide_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      include_notes: true
    ppt:
      strategy: slide_based
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      convert_first: true
    odt:
      strategy: heading_hierarchy
      chunk_size: null
      chunk_overlap: null
      chunk_unit: null
      convert_first: true
embedding:
  model: BAAI/bge-m3
  device: cpu
  vector_store: chroma
  chroma_path: ./data/chroma_db
retrieval:
  top_k: 5
  hybrid_search: false
  bm25_weight: 0.3
  rerank: true
  rerank_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  rerank_candidate_pool: 10
  rerank_min_score: null
llm:
  provider: ollama
  model: mistral
  base_url: http://127.0.0.1:11434
  api_key: null
  temperature: 0.2
  max_tokens: 1024
  system_prompt: 'You are a helpful assistant. Answer only from the provided context.

    If you don''t know, say so clearly.

    '
agent:
  enabled: true
  max_iterations: 6
  memory_turns: 10
  tools:
  - pdf_loader
  - excel_reader
  - json_parser
  - vector_search
  - calculator
  - datetime
tts:
  engine: pyttsx3
  voice: male
  rate: 1.0
  volume: 1.0
  mute: true
ui:
  mode: gradio
  host: 127.0.0.1
  port: 7860
  show_sources: true
  show_agent_trace: false
